name: slayerfs docker image

on:
  pull_request:
    paths:
      - 'project/slayerfs/**'
      - '.github/workflows/slayerfs-docker.yml'
  push:
    branches:
      - main
    paths:
      - 'project/slayerfs/**'
      - '.github/workflows/slayerfs-docker.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-image-test:
    name: slayerfs docker image test
    runs-on: [self-hosted]
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run docker image integration flow
        run: |
          chmod +x project/slayerfs/tests/scripts/test_docker_image.sh
          project/slayerfs/tests/scripts/test_docker_image.sh --image slayerfs:test

  docker-publish:
    name: push slayerfs image to Docker Hub
    if: github.event_name != 'pull_request' && vars.SLAYERFS_DOCKERHUB_REPOSITORY != '' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != ''
    needs: docker-image-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ vars.SLAYERFS_DOCKERHUB_REPOSITORY }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: project
          file: project/slayerfs/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}